<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smarthome Terminal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='stylesheet.css') }}">
</head>
<body>
    <center><h1>Hello This is the placeholder for the <b>index.html</b></h1></center>
    <div class="grid-container">
        <div class="grid-box">
            <span id="clock">Loading...</span>
        </div>
        <div class="grid-box">Box 2</div>
        <div class="grid-box">Box 3</div>
        <div class="grid-box">Box 4</div>
        <div class="grid-box">Box 5</div>
        <div class="grid-box">Box 6</div>     
        <div class="grid-box">Box 7</div>     
        <div class="grid-box">Box 8</div>   
        <div class="grid-box">Box 9</div>       
    </div>
</html>

<script>
async function updateClock() {
    const response = await fetch("/time");
    const data = await response.json();

    document.getElementById("clock").innerText = data.time;
}

// update every 1 second
setInterval(updateClock, 1000);

// run once immediately
updateClock();
</script>

</body>
