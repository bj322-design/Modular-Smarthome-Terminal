<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smarthome Terminal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='stylesheet.css') }}">
    {% for widget in widgets %}
        {% if widget.css_name %}
        <link rel="stylesheet" href="{{ url_for('static', filename='widgetCSS/' + widget.css_name) }}">
        {% endif %}
    {% endfor %}
</head>

<body>
    <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
    <!--<center>
        <h1>Hello This is the placeholder for the <b>index.html</b></h1>
    </center>
-->

    

    <div class="grid-container">
        {% for widget in widgets %}
        <div class="widget" id="widget-{{ widget.name }}"
            style="grid-row: {{ widget.row }}; grid-column: {{ widget.col }}">
            <span id="{{ widget.id }}">{{ widget.content }}</span>
             <!-- <div id="content-{{ widget.id }}"></div> -->
        </div>
        {% endfor %}

        {# Fill remaining empty spots if needed #}
        {% for i in range(1, 10 - widgets|length) %}
        <div class="grid-box">Box {%print(i + widgets | length)%}</div>
        {% endfor %}
    </div>



    
</body>

</html>

<script>
const routeMap = {
    "clock": "/time",
    "temp": "/temperature",
    "weather": "/api/weather/smt",
    "time-zone": "/api/timezone/data",
    "calendar": "/calendar",
    "packages": "/packages",
    "spotify": "/spotify",
    "google-tasks": "/google-tasks"
};

const widgetIds = [
    {% for widget in widgets %}
    "{{ widget.id }}"{% if not loop.last %},{% endif %}
    {% endfor %}
];

widgetIds.forEach(id => {
    const route = routeMap[id];
    if (!route) return;

    fetch(route)
        .then(r => r.text())
        .then(html => {
            const el = document.getElementById("content-" + id);
            if (el) el.innerHTML = html;
        });
});
</script>
</body>
