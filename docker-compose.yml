version: '3.8'

services:
  smt-terminal:
    build: .
    container_name: smart_matter_terminal
    ports:
      - "5000:5000"
    volumes:
      # Persist your runtime configurations and databases on your Windows host
      - ./layout_client.json:/app/layout_client.json
      - ./smt_database.db:/app/smt_database.db
      # Optional: mount the whole directory if you want live-reloading changes during dev
      # - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=production
    restart: unless-stopped